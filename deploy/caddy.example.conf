# Example Caddyfile: HTTPS termination and reverse proxy to the app.
# Replace example.com and sync APP_BASE_URL / GOOGLE_REDIRECT_URL with your public URL.

example.com {
	encode gzip zstd

	# Optional: restrict admin paths by IP
	# @local {
	#   remote_ip 10.0.0.0/8 192.168.0.0/16
	# }

	reverse_proxy 127.0.0.1:8080
}
